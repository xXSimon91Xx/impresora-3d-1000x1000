[mcu]
# Microcontrolador principal - STM32H723
# El serial se obtiene con: ls /dev/serial/by-id/
# Conectar via USB a la BTT Pi/CB1
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_15000F001051313531383332-if00

[printer]
kinematics: cartesian
max_velocity: 300          # mm/s
max_accel: 3000            # mm/s²
max_z_velocity: 5          # mm/s - lento para precisión
max_z_accel: 100           # mm/s²

########################################
# EJE X - MOTOR 0 (TMC2209 UART)
# Endstop PG6 | rotation_distance: 40mm (GT2 20T)
########################################
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40      # 20 dientes × 2mm paso = 40mm/vuelta
endstop_pin: ^!PG6
position_endstop: 0
position_max: 1000
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC4
run_current: 0.600
hold_current: 0.300
stealthchop_threshold: 999999

########################################
# EJE Y - MOTOR 2_1 + 2_2 (TMC2209 UART)
# 1 driver, 2 motores NEMA17 en paralelo
# Endstop PG9 | rotation_distance: 40mm
########################################
[stepper_y]
step_pin: PF11             # MOTOR 2_1
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PG9
position_endstop: 0
position_max: 1000
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC6
run_current: 1.000
hold_current: 0.500
stealthchop_threshold: 999999

########################################
# EJE Z IZQUIERDO - MOTOR 1 (TMC5160 SPI)
# NEMA23 | husillo M12 4 entradas = 8mm/vuelta
# Endstop virtual: CR Touch
########################################
[stepper_z]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 8       # M12 × 4 entradas = 8mm/vuelta
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 1000
homing_speed: 10

[tmc5160 stepper_z]
cs_pin: PD11
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 2.000
hold_current: 1.000
stealthchop_threshold: 999999
driver_TOFF: 3
driver_HSTRT: 4
driver_HEND: 3

########################################
# EJE Z DERECHO - MOTOR 5 (TMC5160 SPI)
# NOTA: MOTOR 3 defectuoso de fábrica → movido a MOTOR 5
########################################
[stepper_z1]
step_pin: PC13             # MOTOR 5
dir_pin: !PF0              # ! invertido para misma dirección que Z
enable_pin: !PF1
microsteps: 16
rotation_distance: 8       # M12: paso 2mm × 4 entradas = 8mm/vuelta

[tmc5160 stepper_z1]
cs_pin: PE4
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 2.000
hold_current: 1.000
stealthchop_threshold: 999999
driver_TOFF: 3
driver_HSTRT: 4
driver_HEND: 3

########################################
# ENDSTOP SEGURIDAD Z MÁXIMO (J49 - PF7)
# Parada de emergencia si eje Z sube demasiado
########################################
[gcode_button endstop_z_max]
pin: ~PF7                  # pulldown - NO usar ^ (pullup)
press_gcode:
  M118 EMERGENCIA - Endstop Z maximo activado
  M112

########################################
# EXTRUSOR - LDO SMART ORBITER v3.0 (MOTOR 4)
# Motor: LDO-36STH20-1004AHG
# Termistor: ATC Semitec 104NT-4-R025H42G
# Calentador: 24V 72W cerámico | Reducción 7.5:1
########################################
[extruder]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637   # Calibrado (oficial SO3: 4.69)
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
heater_pin: PA3
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF4
min_temp: 0
max_temp: 300
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: PF2
run_current: 0.850
hold_current: 0.100
stealthchop_threshold: 0   # DESACTIVADO - mejor respuesta extrusor

########################################
# VENTILADOR HEATSINK SO3 (FAN2 - PD12)
########################################
[heater_fan hotend_fan]
pin: PD12
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

########################################
# VENTILADOR DE CAPA (FAN3 - J53 - PD13)
########################################
[fan]
pin: PD13

########################################
# CR TOUCH ALT04 (Creality)
# Azul→PB7 | Rojo→GND | Amarillo→PB6 | Negro→5V | Blanco→GND
########################################
[bltouch]
sensor_pin: ^PB7
control_pin: PB6
pin_up_touch_mode_reports_triggered: False
x_offset: 0
y_offset: 0
z_offset: 0               # Calibrar con PROBE_CALIBRATE
speed: 5.0
lift_speed: 10.0
samples: 2
sample_retract_dist: 5.0

[safe_z_home]
home_xy_position: 500, 500 # Centro cama 1000×1000
speed: 100
z_hop: 10
z_hop_speed: 10

########################################
# BED MESH - 25 puntos 5×5
########################################
[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 30, 30
mesh_max: 970, 970
probe_count: 5, 5
mesh_pps: 2, 2
algorithm: bicubic

########################################
# SENSOR FILAMENTO SO3
# PG11 = switch filamento | PG10 = botón descarga
########################################
[filament_switch_sensor sensor_filamento]
switch_pin: ^PG11
pause_on_runout: True
runout_gcode:
  M118 Filamento agotado - pausando impresión

[gcode_button boton_descarga]
pin: ^!PG10
press_gcode:
release_gcode:
  M118 Botón descarga pulsado
  filament_unload_init

########################################
# Z_TILT - Nivelación dual Z independiente
########################################
[z_tilt]
z_positions:
    -50, 150
    350, 150
points:
    30, 150
    270, 150
speed: 50
horizontal_move_z: 5

[force_move]
enable_force_move: True

########################################
# CAMA CALEFACTADA (termistor pendiente instalación)
########################################
[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF3
control: watermark
min_temp: -110
max_temp: 130

[idle_timeout]
timeout: 600
gcode:
  TURN_OFF_HEATERS
  M84

########################################
# UTILIDADES
########################################
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]
[display_status]
[respond]

########################################
# MACROS
########################################
[gcode_macro PREPARAR_TEST]
gcode:
  SET_KINEMATIC_POSITION X=100 Y=100 Z=10
  M117 Todos los sistemas operativos

[gcode_macro filament_unload_init]
gcode:
  {% if printer.print_stats.state != "printing" %}
    M118 Iniciando descarga de filamento...
    M109 S185
    G92 E0
    G1 E-5 F3000
    G1 E-25 F300
    M104 S0
    M118 Filamento descargado correctamente
  {% else %}
    M118 No se puede descargar mientras se imprime!
  {% endif %}

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
  BASE_PAUSE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
  BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
  TURN_OFF_HEATERS
  BASE_CANCEL_PRINT

[gcode_macro START_PRINT]
# Llamar desde el slicer: START_PRINT BED_TEMP={material_bed_temperature} EXTRUDER_TEMP={material_print_temperature}
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
  M140 S{BED_TEMP}
  M109 S{EXTRUDER_TEMP}
  M190 S{BED_TEMP}
  G28
  Z_TILT_ADJUST
  BED_MESH_CALIBRATE
  G92 E0
  G1 Z5 F3000
  G1 X10 Y10 F5000
  G1 Z0.3 F300
  G92 E0
  M117 Imprimiendo...

[gcode_macro END_PRINT]
gcode:
  M400
  G92 E0
  G1 E-5 F3000
  TURN_OFF_HEATERS
  G28 X Y
  M84
  M117 Impresión completada

