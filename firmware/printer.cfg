# printer.cfg — Impresora 3D Cartesiana 1000x1000x1000mm
# Placa: BTT Octopus Pro V1.1 (STM32H723)
# Control: BTT CB1 (ARM Cortex-A55)
# Firmware: Klipper

[mcu]
# Microcontrolador principal - STM32H723
# El serial se obtiene con: ls /dev/serial/by-id/
# Conectar via USB-C del CB1 a la Octopus Pro
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_15000F001051313531383332-if00

[printer]
# Configuración general de la impresora
# Cinemática cartesiana: ejes X/Y/Z se mueven de forma completamente independiente
# (a diferencia de CoreXY donde X e Y comparten motores)
kinematics: cartesian
max_velocity: 300          # Velocidad máxima de movimiento (mm/s)
max_accel: 3000            # Aceleración máxima (mm/s²)
max_z_velocity: 5          # Velocidad máxima eje Z (mm/s) — lento para precisión
max_z_accel: 100           # Aceleración máxima eje Z (mm/s²)

########################################
# EJE X — MOTOR 0 (TMC2209 UART)
# Motor: NEMA 17
# Endstop: final de carrera físico en PG6
# Transmisión: correa GT2, polea 20 dientes
# rotation_distance = 20 dientes × 2mm paso GT2 = 40mm por vuelta
########################################
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14              # ! = activo en bajo (necesario para habilitar el driver)
microsteps: 16
rotation_distance: 40          # 20 dientes × 2mm paso = 40mm por vuelta
endstop_pin: ^PG6              # ^ = pullup activado
position_endstop: 0            # El home de X está en la posición 0 (extremo izquierdo)
position_max: 1000             # Ancho máximo de la cama en mm
homing_speed: 50               # Velocidad de homing (mm/s)

[tmc2209 stepper_x]
uart_pin: PC4
run_current: 0.600             # Corriente en movimiento (A RMS)
hold_current: 0.300            # Corriente en reposo — reducida para no calentar
stealthchop_threshold: 999999  # StealthChop siempre activo (modo silencioso)

########################################
# EJE Y — MOTOR 2_1 (TMC2209 UART) + MOTOR 2_2 (paralelo físico)
# DOS motores NEMA 17 conectados en PARALELO a un solo driver TMC2209
# El MOTOR 2_2 no tiene sección propia en printer.cfg — mismo driver que 2_1
# Por qué paralelo: tracción simétrica en cama de 1000mm, ahorra slot de driver
# Endstop: final de carrera físico en PG9
########################################
[stepper_y]
step_pin: PF11             # MOTOR 2_1 — driver único para ambos motores Y
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 40      # 20 dientes × 2mm paso = 40mm por vuelta
endstop_pin: ^PG9          # ^ = pullup activado
position_endstop: 0        # El home de Y está en la posición 0 (fondo)
position_max: 1000         # Profundidad máxima de la cama en mm
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC6              # UART del slot MOTOR 2_1
run_current: 1.000         # 1A total ÷ 2 motores en paralelo = ~0.5A cada uno
hold_current: 0.500
stealthchop_threshold: 999999

########################################
# EJE Z IZQUIERDO — MOTOR 1 (TMC5160 SPI)
# Motor: NEMA 23 (requiere 2A — necesita TMC5160, el TMC2209 no aguanta)
# Por qué TMC5160: corriente máxima 3A RMS vs ~1.2A del TMC2209
# Husillo: Métrico 12, 2mm paso × 4 entradas = 8mm por vuelta
# El endstop físico está REEMPLAZADO por el CR Touch (sonda virtual)
# NOTA: MOTOR 3 estaba defectuoso de fábrica — Z derecho movido a MOTOR 5
########################################
[stepper_z]
step_pin: PG0              # MOTOR 1
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 8       # Husillo T12: 2mm paso × 4 entradas = 8mm por vuelta
endstop_pin: probe:z_virtual_endstop  # CR Touch como endstop — no hay endstop físico Z
position_min: -2           # Permite bajar 2mm bajo cero para calibrar Z offset
position_max: 1000
homing_speed: 10           # Lento en Z para máxima precisión

[tmc5160 stepper_z]
cs_pin: PD11               # Chip Select SPI — MOTOR 1
spi_software_miso_pin: PA6 # Bus SPI compartido entre ambos TMC5160
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 1.200         # Calibrado empíricamente — suficiente para NEMA23 en este montaje
hold_current: 0.600
stealthchop_threshold: 999999
driver_TOFF: 3             # Parámetros internos del TMC5160-T Pro
driver_HSTRT: 4
driver_HEND: 3

########################################
# EJE Z DERECHO — MOTOR 5 (TMC5160 SPI)
# Motor ESCLAVO del eje Z — se mueve independientemente durante Z_TILT_ADJUST
# para corregir el paralelismo de la cama (nivelar los dos lados por separado)
# NOTA: Slot MOTOR 3 original estaba defectuoso de fábrica → movido a MOTOR 5
# dir_pin: !PF0 — la ! invierte el sentido porque los motores están en lados opuestos
########################################
[stepper_z1]
step_pin: PC13             # MOTOR 5 (no MOTOR 3 — defectuoso)
dir_pin: !PF0              # ! invertido: mismo sentido de movimiento que stepper_z
enable_pin: !PF1
microsteps: 16
rotation_distance: 7.80    # Calibrado empíricamente (Z izq = 8, Z der = 7.80 — pequeña diferencia física)

[tmc5160 stepper_z1]
cs_pin: PE4                # Chip Select SPI — MOTOR 5 (distinto al MOTOR 1)
spi_software_miso_pin: PA6 # Mismo bus SPI
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 1.200
hold_current: 0.600
stealthchop_threshold: 999999
driver_TOFF: 3
driver_HSTRT: 4
driver_HEND: 3

########################################
# ENDSTOP DE SEGURIDAD Z MÁXIMO — T3 (PF7)
# Final de carrera mecánico en el tope superior del eje Z
# Usa el conector T3 (de temperatura) reconvertido en entrada digital
# Activa M112 (parada de emergencia) si el eje sube demasiado
########################################
[gcode_button endstop_z_max]
pin: ^PF7                  # ^ = pullup. T3 reconvertido como entrada digital
press_gcode:
  M118 EMERGENCIA - Endstop Z maximo activado
  M112

########################################
# EXTRUSOR — ORBITER SO3 — MOTOR 4 (TMC2209 UART)
# Motor: LDO-36STH20-1004AHG (compacto integrado en el SO3)
# Reducción: 7.5:1 — alta relación para máxima precisión y control
# rotation_distance calibrado: 4.637 (oficial SO3: 4.69 — ajustado por medición)
# Termistor: ATC Semitec 104NT-4-R025H42G (más preciso que el genérico NTC100K)
# Calentador: 24V 72W cerámico (pin PA3 = HE0)
# StealthChop DESACTIVADO: el extrusor necesita máxima respuesta, no silencio
########################################
[extruder]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637   # Calibrado para el SO3 (oficial: 4.69)
nozzle_diameter: 0.400     # Boquilla estándar 0.4mm
filament_diameter: 1.750   # Filamento estándar 1.75mm
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
heater_pin: PA3            # HE0 — calentador cerámico 24V 72W
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF4            # T0 — termistor extrusor
min_temp: 0
max_temp: 300
min_extrude_temp: 170      # Seguridad: no extruye por debajo de 170°C (evita atascos en frío)

[tmc2209 extruder]
uart_pin: PF2
run_current: 0.850         # Corriente máxima recomendada SO3 (A RMS)
hold_current: 0.100        # Muy baja en reposo — el extrusor no necesita mantener carga
stealthchop_threshold: 0   # 0 = StealthChop SIEMPRE desactivado — máxima respuesta

########################################
# VENTILADOR HEATSINK SO3 — FAN2 (PD12)
# Ventilador frameless 24V integrado en el SO3 (2 cables, sin PWM)
# Cableado: Rojo → VCC FAN2 / Negro → GND FAN2 / (Amarillo PWM → no conectar)
# Se activa cuando hotend > 50°C y se apaga al enfriarse
# Tipo [heater_fan] y NO [fan]: el [fan] es para capa, este es de heatsink
########################################
[heater_fan hotend_fan]
pin: PD12
heater: extruder
heater_temp: 50.0          # Temperatura de activación (°C)
fan_speed: 1.0             # Siempre a máxima velocidad cuando activo

########################################
# CR TOUCH ALT04 — Sonda de nivelación
# Reemplaza el endstop físico de Z
# Cableado de 5 hilos:
#   Azul    → PB7 (sensor_pin) — señal de detección de toque
#   Rojo    → GND
#   Amarillo→ PB6 (control_pin) — control del servo (deploy/retract)
#   Negro   → 5V alimentación
#   Blanco  → GND
########################################
[bltouch]
sensor_pin: ^PB7           # ^ = pullup activado
control_pin: PB6
pin_up_touch_mode_reports_triggered: False
x_offset: 0               # Offset X entre boquilla y sonda — calibrar físicamente
y_offset: 0               # Offset Y — calibrar físicamente
z_offset: 0               # Se calibra con PROBE_CALIBRATE, luego SAVE_CONFIG lo actualiza
speed: 5.0                # Velocidad de sondeo lenta para máxima precisión
lift_speed: 10.0           # Velocidad de subida entre sondeos
samples: 2                 # 2 muestras por punto — promedio para mayor precisión
sample_retract_dist: 5.0   # Retracción entre muestras

########################################
# HOMING SEGURO CON CR TOUCH
# 1. Hace home en XY primero
# 2. Se mueve al centro de la cama (500,500)
# 3. Baja Z con el CR Touch para encontrar el cero
########################################
[safe_z_home]
home_xy_position: 500, 500  # Centro de la cama 1000x1000
speed: 100
z_hop: 10                   # Sube 10mm antes de moverse (evita roces en superficie)
z_hop_speed: 10

########################################
# MALLA DE NIVELACIÓN (BED MESH 5×5)
# 25 puntos de sondeo para compensar irregularidades de la cama de 1m²
# El algoritmo bicubic interpola entre los puntos
########################################
[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 30, 30           # Margen desde el borde (el CR Touch no llega al borde exacto)
mesh_max: 970, 970         # Margen final
probe_count: 5, 5          # Cuadrícula 5×5 = 25 puntos
mesh_pps: 2, 2             # Puntos de interpolación entre sondeos
algorithm: bicubic         # Mejor que bicubic para superficies complejas

########################################
# SENSOR DE FILAMENTO SO3 (PG11)
# Detecta cuando el filamento se agota y pausa la impresión
########################################
[filament_switch_sensor sensor_filamento]
switch_pin: ^PG11
pause_on_runout: True
runout_gcode:
  M118 Filamento agotado - pausando impresion

########################################
# BOTÓN DE DESCARGA SO3 (PG10)
# Botón físico integrado en el SO3 para descargar el filamento
# Se activa en la soltura (release_gcode), no en la pulsación
########################################
[gcode_button boton_descarga]
pin: ^!PG10                # ^! = pullup + lógica invertida (normalmente cerrado)
press_gcode:
release_gcode:
  M118 Boton descarga pulsado
  filament_unload_init

########################################
# NIVELACIÓN AUTOMÁTICA DUAL Z (Z_TILT)
# Mueve cada motor Z independientemente para igualar las alturas de ambos lados
# z_positions: coordenada X del husillo en la estructura física
# points: dónde sondea el CR Touch para cada lado
########################################
[z_tilt]
z_positions:
    -50, 150               # Posición física del husillo izquierdo (puede ser negativa)
    350, 150               # Posición física del husillo derecho
points:
    30, 150                # Punto de sondeo lado izquierdo
    270, 150               # Punto de sondeo lado derecho
speed: 50
horizontal_move_z: 5

[force_move]
enable_force_move: True    # Permite mover ejes sin hacer home — útil para pruebas

########################################
# CAMA CALEFACTADA
# PENDIENTE: instalar termistor real
# min_temp: -110 es un parche temporal para que Klipper arranque sin sensor
########################################
[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF3
control: watermark
min_temp: -110             # TEMPORAL — restaurar a 0 cuando se instale el termistor
max_temp: 130

########################################
# TIMEOUT DE INACTIVIDAD
# Apaga calefactores y motores tras 10 minutos sin actividad
########################################
[idle_timeout]
timeout: 600               # 600 segundos = 10 minutos
gcode:
  TURN_OFF_HEATERS
  M84                      # Desactiva motores

########################################
# UTILIDADES
########################################
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]             # Habilita pausa/reanudación
[display_status]           # Habilita mensajes de estado
[respond]                  # Habilita M118 para mensajes en consola

########################################
# MACROS
########################################

[gcode_macro PREPARAR_TEST]
# Macro de prueba: establece posición virtual sin hacer homing físico
# Útil durante el desarrollo para probar sin riesgo de colisión
gcode:
  SET_KINEMATIC_POSITION X=100 Y=100 Z=10
  M117 Todos los sistemas operativos

[gcode_macro filament_unload_init]
# Descarga el filamento de forma segura
# No funciona durante una impresión (comprueba el estado)
gcode:
  {% if printer.print_stats.state != "printing" %}
    M118 Iniciando descarga de filamento...
    M109 S185              # Calentar a 185°C (suficiente para ablandar PLA/PETG)
    G92 E0
    G1 E-5 F3000           # Retracción rápida inicial 5mm (rompe el filamento)
    G1 E-25 F300           # Retracción lenta 25mm (saca del hotend limpiamente)
    M104 S0
    M118 Filamento descargado correctamente
  {% else %}
    M118 No se puede descargar mientras se imprime!
  {% endif %}

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
  BASE_PAUSE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
  BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
  TURN_OFF_HEATERS
  BASE_CANCEL_PRINT

########################################
# START_PRINT — Llamar desde el slicer:
# START_PRINT BED_TEMP={material_bed_temperature} EXTRUDER_TEMP={material_print_temperature}
########################################
[gcode_macro START_PRINT]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
  M140 S{BED_TEMP}         # Empieza a calentar la cama (sin esperar — ahorra tiempo)
  M109 S{EXTRUDER_TEMP}    # Calienta el hotend y espera a temperatura
  M190 S{BED_TEMP}         # Espera a que la cama llegue a temperatura
  G28                      # Home completo (X, Y, Z con CR Touch)
  Z_TILT_ADJUST            # Nivela los dos motores Z (iguala los lados)
  BED_MESH_CALIBRATE       # Mapea la superficie de la cama (25 puntos)
  G92 E0
  G1 Z5 F3000
  G1 X10 Y10 F5000
  G1 Z0.3 F300
  G92 E0
  M117 Imprimiendo...

########################################
# END_PRINT — Llamar desde el slicer: END_PRINT
########################################
[gcode_macro END_PRINT]
gcode:
  M400                     # Espera a que terminen los movimientos pendientes
  G92 E0
  G1 E-5 F3000             # Retracción final (evita stringing al levantar)
  TURN_OFF_HEATERS
  G28 X Y                  # Home XY para apartar el cabezal de la impresión
  M84                      # Desactiva motores
  M117 Impresion completada

